spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/onetap_pc
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

# JWT настройки
jwt:
  secret: your-very-long-secret-key-here-at-least-256-bits-change-in-production-2026
  expiration: 86400000          # 24 часа
  refresh-expiration: 604800000 # 7 дней